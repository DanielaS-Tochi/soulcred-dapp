<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SoulCred - Decentralized platform for issuing and managing Soulbound Tokens representing learning achievements and community contributions." />
    <meta name="keywords" content="Web3, Soulbound Tokens, SBT, Credentials, Learning, Blockchain, Decentralized, Education" />
    <meta name="author" content="Daniela Silvana Tochi" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SoulCred - Decentralized Credential Platform" />
    <meta property="og:description" content="Create and manage Soulbound Tokens that represent your learning achievements and community contributions." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="SoulCred - Decentralized Credential Platform" />
    <meta property="twitter:description" content="Create and manage Soulbound Tokens that represent your learning achievements and community contributions." />
    
    <title>SoulCred - Decentralized Credential Platform</title>
    
    <!-- Enhanced Bolt.new Badge Configuration with Smart Positioning -->
    <style>
      .bolt-badge {
        transition: all 0.3s ease;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        width: 4rem;
        height: 4rem;
        z-index: 9999;
        opacity: 0.9;
      }
      
      .bolt-badge:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.15));
        opacity: 1;
      }
      
      @keyframes badgeIntro {
        0% { 
          transform: scale(0.1) translateX(20px); 
          opacity: 0; 
        }
        50% { 
          transform: scale(1.1) translateX(0); 
        }
        100% { 
          transform: scale(1) translateX(0); 
          opacity: 0.9; 
        }
      }
      
      .bolt-badge-intro {
        animation: badgeIntro 0.8s ease-out 1.5s both;
      }
      
      .bolt-badge-intro.animated {
        animation: none;
      }
      
      @keyframes badgePulse {
        0%, 100% { 
          transform: scale(1); 
          opacity: 0.9; 
        }
        50% { 
          transform: scale(1.02); 
          opacity: 1; 
        }
      }
      
      .bolt-badge.animated {
        animation: badgePulse 3s ease-in-out infinite;
      }
      
      /* Smart positioning that avoids header interference */
      .bolt-badge-container {
        position: fixed;
        z-index: 9998; /* Lower than header elements */
        pointer-events: auto;
      }
      
      /* Default position - bottom right to avoid header */
      .bolt-badge-container {
        bottom: 1rem;
        right: 1rem;
      }
      
      /* Responsive adjustments */
      @media (min-width: 640px) {
        .bolt-badge-container {
          bottom: 1.5rem;
          right: 1.5rem;
        }
        .bolt-badge {
          width: 4.5rem;
          height: 4.5rem;
        }
      }
      
      @media (min-width: 1024px) {
        .bolt-badge-container {
          bottom: 2rem;
          right: 2rem;
        }
        .bolt-badge {
          width: 5rem;
          height: 5rem;
        }
      }
      
      /* When header is present, ensure no overlap */
      .bolt-badge-container.avoid-header {
        top: auto;
        bottom: 1rem;
        right: 1rem;
      }
      
      /* Special handling for mobile when header navigation is visible */
      @media (max-width: 767px) {
        .bolt-badge-container {
          bottom: 1rem;
          right: 1rem;
          top: auto;
        }
        .bolt-badge {
          width: 3.5rem;
          height: 3.5rem;
        }
      }
      
      /* Ensure badge doesn't interfere with any header content */
      .bolt-badge-container.header-active {
        top: auto !important;
        bottom: 1rem !important;
      }
      
      /* Hide badge temporarily when header actions are active */
      .bolt-badge-container.hide-temporarily {
        opacity: 0;
        pointer-events: none;
        transform: scale(0.8);
      }
      
      /* Smooth transitions for all positioning changes */
      .bolt-badge-container {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Enhanced Bolt.new Badge with Smart Positioning -->
    <div class="bolt-badge-container avoid-header">
      <a href="https://bolt.new/?rid=os72mi" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="block transition-all duration-300 hover:shadow-2xl"
         title="Built with Bolt.new - AI-powered development platform">
        <img src="https://storage.bolt.army/black_circle_360x360.png" 
             alt="Built with Bolt.new" 
             class="bolt-badge bolt-badge-intro rounded-full shadow-lg border-2 border-white/20 backdrop-blur-sm"
             onanimationend="this.classList.add('animated')" />
      </a>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Enhanced script to handle badge positioning intelligently -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const badgeContainer = document.querySelector('.bolt-badge-container');
        let hideTimeout;
        
        // Function to check if header actions are active
        function checkHeaderActivity() {
          // Check for open dropdowns, modals, or active header elements
          const activeElements = document.querySelectorAll([
            '[aria-expanded="true"]',
            '.dropdown-open',
            '.modal-open',
            'header button:focus',
            'header button:hover',
            '.header-menu-open'
          ].join(','));
          
          return activeElements.length > 0;
        }
        
        // Function to update badge position based on header state
        function updateBadgePosition() {
          const header = document.querySelector('header');
          const isHeaderActive = checkHeaderActivity();
          
          if (isHeaderActive) {
            badgeContainer.classList.add('hide-temporarily');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
              badgeContainer.classList.remove('hide-temporarily');
            }, 2000); // Hide for 2 seconds when header is active
          } else {
            badgeContainer.classList.remove('hide-temporarily');
          }
          
          // Always keep badge at bottom to avoid header interference
          badgeContainer.classList.add('header-active');
        }
        
        // Monitor header activity
        const observer = new MutationObserver(updateBadgePosition);
        observer.observe(document.body, { 
          childList: true, 
          subtree: true, 
          attributes: true,
          attributeFilter: ['aria-expanded', 'class']
        });
        
        // Monitor focus and hover events on header elements
        document.addEventListener('focusin', function(e) {
          if (e.target.closest('header')) {
            updateBadgePosition();
          }
        });
        
        document.addEventListener('focusout', function(e) {
          if (e.target.closest('header')) {
            setTimeout(updateBadgePosition, 100);
          }
        });
        
        // Monitor mouse events on header
        document.addEventListener('mouseover', function(e) {
          if (e.target.closest('header')) {
            updateBadgePosition();
          }
        });
        
        document.addEventListener('mouseout', function(e) {
          if (e.target.closest('header')) {
            setTimeout(updateBadgePosition, 100);
          }
        });
        
        // Handle window resize
        window.addEventListener('resize', updateBadgePosition);
        
        // Initial positioning
        setTimeout(updateBadgePosition, 100);
        
        // Ensure badge doesn't interfere with logout or other header actions
        document.addEventListener('click', function(e) {
          if (e.target.closest('header')) {
            badgeContainer.classList.add('hide-temporarily');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
              badgeContainer.classList.remove('hide-temporarily');
            }, 1500);
          }
        });
      });
    </script>
  </body>
</html>
